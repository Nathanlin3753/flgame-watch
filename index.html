<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>童話金銀商場儀表板</title>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --border-color: #e2e8f0;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --highlight-bg: #fffbeb;
            --table-header-bg: #f8fafc;
            --row-hover-bg: #f8fafc;
            --card-sub-bg: #f1f5f9;
            --tab-active-bg: #14b8a6;
            --tab-active-text: #ffffff;
            --tab-inactive-bg: #ffffff;
            --tab-inactive-border: #cbd5e1;
            --glow-color: rgba(239, 68, 68, 0.4);
            --dropdown-hover: #f1f5f9;
        }
        .item-icon {
            width: 28px;
            height: 28px;
            object-fit: contain;
            vertical-align: middle;
            margin-right: 8px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.05);
        }
        [data-theme="dark"] .item-icon {
            background: rgba(255, 255, 255, 0.05);
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --border-color: #334155;
            --accent-green: #34d399;
            --accent-red: #f87171;
            --highlight-bg: #3c381c;
            --table-header-bg: #1e293b;
            --row-hover-bg: #1e293b;
            --card-sub-bg: #0f172a;
            --tab-active-bg: #0d9488;
            --tab-active-text: #ffffff;
            --tab-inactive-bg: #1e293b;
            --tab-inactive-border: #475569;
            --glow-color: rgba(248, 113, 113, 0.5);
            --dropdown-hover: #334155;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg-primary); 
            color: var(--text-main); 
            margin: 0; 
            padding: 30px; 
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.2s, color 0.2s;
        }

        .container { 
            width: 100%;
            max-width: 1280px; 
            box-sizing: border-box;
            margin: 0 auto; 
            background: var(--panel-bg); 
            padding: 35px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            flex: 1;
            display: flex;
            flex-direction: column;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h1 { 
            margin: 0; 
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            color: var(--text-main);
        }

        .meta-container {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .meta-info { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            background: var(--card-sub-bg);
            padding: 8px 16px;
            border-radius: 9999px;
            font-weight: 500;
        }

        .btn {
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .history-btn {
            background-color: var(--primary-color);
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.15);
        }

        .history-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .theme-toggle-btn {
            background-color: var(--card-sub-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
        }
        
        .theme-toggle-btn:hover {
            background-color: var(--border-color);
        }

        .filter-section { 
            background: var(--card-sub-bg); 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
            border: 1px solid var(--border-color); 
            align-items: center;
        }

        .filter-group { 
            position: relative; 
            display: flex; 
            flex-direction: column; 
        }
        .filter-group label { 
            font-size: 0.8rem; 
            font-weight: 700; 
            color: var(--text-muted); 
            margin-bottom: 6px; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .filter-group input, .filter-group select { 
            padding: 10px 14px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            font-size: 0.9rem; 
            outline: none; 
            transition: all 0.15s ease;
            background: var(--panel-bg);
            color: var(--text-main);
            box-sizing: border-box;
        }
        .filter-group input:focus, .filter-group select:focus { 
            border-color: var(--primary-color); 
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); 
        }

        .search-suggest-panel {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-top: 5px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            z-index: 100;
            max-height: 250px;
            overflow-y: auto;
            box-sizing: border-box;
        }
        .search-suggest-panel.active {
            display: block;
        }
        .suggest-header {
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            background: var(--card-sub-bg);
        }
        .suggest-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .suggest-item:hover {
            background: var(--dropdown-hover);
        }
        .suggest-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .pin-btn, .delete-btn {
            background: none;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: transform 0.10s ease;
        }
        .pin-btn { color: #94a3b8; }
        .pin-btn.pinned { color: #f59e0b; }
        .delete-btn { color: #f87171; }
        .pin-btn:hover, .delete-btn:hover {
            transform: scale(1.15);
        }

        .custom-combobox {
            position: relative;
        }
        .combobox-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .combobox-clear {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: bold;
            display: none;
        }
        .combobox-list {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-top: 5px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            z-index: 100;
            max-height: 250px;
            overflow-y: auto;
            box-sizing: border-box;
        }
        .combobox-list.active {
            display: block;
        }
        .combobox-group-header {
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--primary-color);
            background: var(--card-sub-bg);
            letter-spacing: 0.05em;
        }
        .combobox-option {
            padding: 8px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .combobox-option:hover {
            background: var(--dropdown-hover);
        }
        
        .checkbox-group { display: flex; align-items: center; height: 100%; padding-top: 15px; }
        .checkbox-group label { 
            display: flex; 
            align-items: center; 
            font-size: 0.9rem; 
            font-weight: 600; 
            color: var(--text-main); 
            cursor: pointer; 
            user-select: none; 
        }
        .checkbox-group input { 
            width: 18px; 
            height: 18px; 
            margin-right: 8px; 
            cursor: pointer; 
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .category-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .category-tab {
            display: inline-flex;
            align-items: center;
            padding: 8px 20px;
            border-radius: 9999px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--tab-inactive-border);
            background: var(--tab-inactive-bg);
            color: var(--text-main);
            user-select: none;
        }

        .category-tab:hover {
            border-color: var(--primary-color);
            transform: translateY(-1px);
        }

        .category-tab.active {
            background-color: var(--tab-active-bg);
            color: var(--tab-active-text);
            border-color: var(--tab-active-bg);
            box-shadow: 0 4px 12px -2px rgba(20, 184, 166, 0.35);
        }

        .category-count {
            margin-left: 8px;
            background-color: var(--card-sub-bg);
            color: var(--text-muted);
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 750;
            display: inline-block;
            transition: background-color 0.2s, color 0.2s;
        }

        .category-tab.active .category-count {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 10px; text-align: left; }
        th, td { padding: 14px 18px; border-bottom: 1px solid var(--border-color); }
        th { 
            background-color: var(--table-header-bg); 
            color: var(--text-muted); 
            font-weight: 700; 
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s, color 0.2s;
        }
        th:hover {
            color: var(--text-main);
            background-color: var(--border-color);
        }
        th.sort-active {
            color: var(--primary-color);
        }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: var(--row-hover-bg); }
        .badge { background: var(--border-color); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); }
        .badge-attr { background: #e0e7ff; color: #4338ca; border: 1px solid #c7d2fe; }
        [data-theme="dark"] .badge-attr { background: #1e1b4b; color: #a5b4fc; border: 1px solid #312e81; }
        .highlight { background-color: var(--highlight-bg); }
        
        .watchlist-row {
            background-color: rgba(245, 158, 11, 0.06);
        }
        [data-theme="dark"] .watchlist-row {
            background-color: rgba(245, 158, 11, 0.08);
        }

        .snipe-row {
            background-color: rgba(239, 68, 68, 0.08) !important;
            animation: snipeGlow 3s infinite alternate;
        }
        [data-theme="dark"] .snipe-row {
            background-color: rgba(239, 68, 68, 0.12) !important;
        }
        
        @keyframes snipeGlow {
            0% { box-shadow: inset 0 0 4px var(--accent-red), 0 0 4px var(--glow-color); }
            100% { box-shadow: inset 0 0 12px var(--accent-red), 0 0 16px var(--glow-color); }
        }

        .badge-snipe {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: white;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 900;
            margin-left: 8px;
            display: inline-block;
            vertical-align: middle;
            animation: heartBeat 1.5s infinite;
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4);
        }

        .badge-new { 
            background: var(--accent-red); 
            color: white; 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 0.7rem; 
            margin-left: 8px; 
            font-weight: 800; 
            display: inline-block; 
            vertical-align: middle; 
            animation: pulse 2s infinite; 
        }
        .price-drop { color: var(--accent-green); font-size: 0.8rem; font-weight: 700; margin-top: 4px; }
        .price-stat { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; font-weight: 500; }
        .lowest-badge { color: var(--accent-green); font-weight: 700; font-size: 0.75rem; display: block; margin-top: 2px; }
        
        .star-btn {
            background: none;
            border: none;
            font-size: 1.15rem;
            cursor: pointer;
            margin-right: 6px;
            color: #d1d5db;
            transition: transform 0.15s ease, color 0.15s ease;
            outline: none;
            vertical-align: middle;
        }
        .star-btn:hover { transform: scale(1.2); }
        .star-btn.starred { color: #f59e0b; }

        .footer { 
            text-align: center; 
            margin-top: 40px; 
            padding: 20px 0 10px 0; 
            border-top: 1px solid var(--border-color); 
            font-size: 0.9em; 
            color: var(--text-muted); 
        }
        .footer a { 
            color: var(--primary-color); 
            text-decoration: none; 
            font-weight: bold; 
            transition: color 0.2s; 
        }
        .footer a:hover { 
            color: var(--primary-hover); 
            text-decoration: underline; 
        }
        .heart-icon { 
            color: var(--accent-red); 
            animation: heartBeat 1.2s infinite; 
            display: inline-block; 
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); background-color: #dc2626; }
            100% { transform: scale(1); }
        }
        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.12); }
            28% { transform: scale(1); }
            42% { transform: scale(1.12); }
            70% { transform: scale(1); }
        }

        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(8px); 
            justify-content: center; 
            align-items: center; 
            animation: fadeIn 0.2s ease;
        }
        
        .modal-content { 
            background: var(--panel-bg); 
            padding: 30px; 
            border-radius: 16px; 
            width: 90%; 
            max-width: 520px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); 
            border: 1px solid var(--border-color);
            animation: slideIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .modal-title {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.15s ease;
        }

        .close-btn:hover { color: var(--text-main); }

        .history-list {
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            border-radius: 8px;
            transition: background 0.15s ease;
        }

        .history-item:hover { background: var(--row-hover-bg); }
        .history-item:last-child { border-bottom: none; }

        .history-time {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .history-relative {
            font-size: 0.8rem;
            color: var(--primary-color);
            background-color: #e0e7ff;
            padding: 2px 8px;
            border-radius: 9999px;
            font-weight: 600;
        }
        [data-theme="dark"] .history-relative {
            background-color: #312e81;
            color: #a5b4fc;
        }

        .history-empty {
            text-align: center;
            color: var(--text-muted);
            padding: 30px 0;
            font-size: 0.9rem;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h1>童話金銀商場儀表板</h1>
            <div class="meta-container">
                <div class="meta-info">
                    最後抓取: 2026-07-22 19:17:02 | 商品總數: 477 筆
                </div>
                <button class="btn theme-toggle-btn" onclick="toggleTheme()" title="切換深/淺色模式">
                    <span id="themeBtnText">🌓 主題</span>
                </button>
                <button class="btn history-btn" onclick="openHistoryModal()">
                    🕒 24H 網站更新歷史
                </button>
            </div>
        </div>
        
        <div class="filter-section">
            <div class="filter-group">
                <label for="searchName">物品名稱關鍵字</label>
                <input type="text" id="searchName" placeholder="輸入例如: 颶風斧..." onfocus="showSuggestPanel()" oninput="onSearchInput()">
                <div class="search-suggest-panel" id="searchSuggestPanel"></div>
            </div>

            <div class="filter-group">
                <label for="searchAttr">裝備屬性詞條</label>
                <div class="custom-combobox">
                    <div class="combobox-input-wrapper">
                        <input type="text" id="searchAttr" placeholder="選擇或搜尋真實詞條..." onfocus="showComboboxList()" oninput="filterComboboxOptions()">
                        <button class="combobox-clear" id="comboboxClearBtn" onclick="clearCombobox(event)">×</button>
                    </div>
                    <div class="combobox-list" id="comboboxList"></div>
                </div>
            </div>

            <div class="filter-group">
                <label for="minAttrValue">屬性數值大於或等於 (>=)</label>
                <input type="number" id="minAttrValue" value="0" min="0" oninput="filterData()">
            </div>
            <div class="checkbox-group">
                <label>
                    <input type="checkbox" id="onlyNew" onchange="filterData()"> 只看全新上架 (NEW)
                </label>
            </div>
            <div class="checkbox-group">
                <label style="color: var(--accent-red); font-weight: 800;">
                    <input type="checkbox" id="onlySnipe" onchange="filterData()"> 🔥 只看神級撿漏 (<-85%!)
                </label>
            </div>
            <div class="checkbox-group">
                <label style="color: var(--accent-green); font-weight: 800;">
                    <input type="checkbox" id="onlyPriceDrop" onchange="filterData()"> 📉 只看有降價 (PRICE DROP)
                </label>
            </div>
        </div>

        <div class="category-tabs" id="categoryTabsContainer"></div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th id="th-name" onclick="changeSort('Name')">物品名稱 <span class="sort-indicator"></span></th>
                        <th id="th-attrs" onclick="changeSort('Attrs')">屬性/精鍊 (Attrs) <span class="sort-indicator"></span></th>
                        <th id="th-price" onclick="changeSort('PriceRaw')">價格 <span class="sort-indicator"></span></th>
                        <th id="th-qty" onclick="changeSort('QtyRaw')">數量 <span class="sort-indicator"></span></th>
                        <th id="th-stall" onclick="changeSort('Stall')">攤位名稱 <span class="sort-indicator"></span></th>
                        <th id="th-pos" onclick="changeSort('Position')">座標位置 <span class="sort-indicator"></span></th>
                        <th id="th-cat" onclick="changeSort('Category')">分類 <span class="sort-indicator"></span></th>
                    </tr>
                </thead>
                <tbody id="itemTableBody"></tbody>
            </table>
        </div>

        <footer class="footer">
            <p>
                Made with <span class="heart-icon">❤</span> by 
                <a href="https://github.com/Nathanlin3753/flgame-watch" target="_blank">敬愛護妻-小黑</a>
            </p>
            <p style="font-size: 0.8rem; color: #a0aec0; margin-top: 5px;">
                © 2026 flgame-watch Project. All rights reserved.
            </p>
        </footer>
    </div>

    <div id="historyModal" class="modal" onclick="closeHistoryModalOnOutsideClick(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">🕒 24小時網站更新歷史</h3>
                <button class="close-btn" onclick="closeHistoryModal()">&times;</button>
            </div>
            <div class="history-list" id="historyListContainer"></div>
        </div>

        });

        const discoveredAttributes = Array.from(dynamicAttributesSet).sort((a, b) => a.localeCompare(b, 'zh-TW'));

        function filterData() {
            var nameQuery = document.getElementById('searchName').value.toLowerCase();
            var attrQuery = document.getElementById('searchAttr').value.trim();
            var minVal = parseInt(document.getElementById('minAttrValue').value, 10) || 0;
            var onlyNew = document.getElementById('onlyNew').checked;
            var onlySnipe = document.getElementById('onlySnipe').checked;
            var onlyPriceDrop = document.getElementById('onlyPriceDrop').checked;

            var tbody = document.getElementById('itemTableBody');
            tbody.innerHTML = '';

            let filteredItems = [];
            rawData.forEach(function(item) {
                var nameMatch = !nameQuery || item.Name.toLowerCase().indexOf(nameQuery) !== -1;
                var attrMatch = true;
                if (attrQuery) {
                    var extractedValue = parseAttributeValue(item.Attrs, attrQuery);
                    attrMatch = extractedValue !== null ? extractedValue >= minVal : false;
                }

                var newMatch = !onlyNew || item.IsNew;
                var snipeMatch = !onlySnipe || item.IsSnipe;
                var priceDropMatch = !onlyPriceDrop || item.PriceDropped;
                var catMatch = (activeCategory === '全部' || item.Category === activeCategory);

                if (nameMatch && attrMatch && newMatch && snipeMatch && priceDropMatch && catMatch) {
                    filteredItems.push(item);
                }
            });

            filteredItems.sort(function(a, b) {
                const aStarred = starredList.indexOf(a.Name) !== -1 ? 1 : 0;
                const bStarred = starredList.indexOf(b.Name) !== -1 ? 1 : 0;
                if (aStarred !== bStarred) return bStarred - aStarred;
                
                let valA = a[currentSortCol];
                let valB = b[currentSortCol];
                if (typeof valA === 'string') {
                    return currentSortDir === 'asc' ? valA.localeCompare(valB, 'zh-TW') : valB.localeCompare(valA, 'zh-TW');
                } else {
                    return currentSortDir === 'asc' ? (valA || 0) - (valB || 0) : (valB || 0) - (valA || 0);
                }
            });

            filteredItems.forEach(function(item) {
                const isStarred = starredList.indexOf(item.Name) !== -1;
                var row = document.createElement('tr');
                
                let rowClasses = [];
                if (attrQuery) rowClasses.push('highlight');
                if (isStarred) rowClasses.push('watchlist-row');
                if (item.IsSnipe) rowClasses.push('snipe-row');
                if (rowClasses.length > 0) row.className = rowClasses.join(' ');
                
                const starClass = isStarred ? 'star-btn starred' : 'star-btn';
                const starIcon = isStarred ? '★' : '☆';
                var nameDisplay = '<button class="' + starClass + '" onclick="toggleStar(\'' + item.Name + '\', event)">' + starIcon + '</button>';

                if (item.ImgUrl && item.ImgUrl !== "") {
                    nameDisplay += '<img src="' + item.ImgUrl + '" class="item-icon" alt="" onerror="this.remove();">';
                }

                nameDisplay += '<strong>' + item.Name + '</strong>';

                if (item.IsSnipe) {
                    nameDisplay += '<span class="badge-snipe">🔥 撿漏 -' + item.SnipeDiscount + '%</span>';
                } else if (item.IsNew) {
                    nameDisplay += '<span class="badge-new">NEW</span>';
                }
                
                var priceDisplay = '<div style="color: #e53e3e; font-weight: bold;">' + item.Price + '</div>';
                
                if (item.Category === '道具') {
                    priceDisplay += '<div class="price-stat">單價: ' + (item.UnitPriceRaw || 0).toLocaleString() + '</div>';
                    if (item.PriceDropped) {
                        var tStr = item.PrevTime ? ' (對比 ' + item.PrevTime.split(' ')[0].substring(5) + ')' : ' (對比上次)';
                        priceDisplay += '<div class="price-drop">↓ 便宜了 ' + item.PriceDiff.toLocaleString() + tStr + '</div>';
                    } else if (itemStats[item.Name] && itemStats[item.Name].count > 1) {
                        const stat = itemStats[item.Name];
                        priceDisplay += '<div class="price-stat">單價區間: ' + formatCompact(stat.min) + ' ~ ' + formatCompact(stat.max) + ' (' + stat.count + '件)</div>';
                        if (item.UnitPriceRaw === stat.min) {
                            priceDisplay += '<span class="lowest-badge">🟢 市場最低單價!</span>';
                        }
                    }
                } else {
                    if (item.QtyRaw > 1) {
                        priceDisplay += '<div class="price-stat">單價: ' + (item.UnitPriceRaw || 0).toLocaleString() + '</div>';
                    }
                    if (item.PriceDropped) {
                        var tStr = item.PrevTime ? ' (對比 ' + item.PrevTime.split(' ')[0].substring(5) + ')' : ' (對比上次)';
                        priceDisplay += '<div class="price-drop">↓ 便宜了 ' + item.PriceDiff.toLocaleString() + tStr + '</div>';
                    } else if (itemStats[item.Name] && itemStats[item.Name].count > 1) {
                        const stat = itemStats[item.Name];
                        priceDisplay += '<div class="price-stat">價格區間: ' + formatCompact(stat.min) + ' ~ ' + formatCompact(stat.max) + ' (' + stat.count + '件)</div>';
                        if (item.PriceRaw === stat.min) {
                            priceDisplay += '<span class="lowest-badge">🟢 市場最低價!</span>';
                        }
                    }
                }
                
                var attrDisplay = (item.Attrs && item.Attrs !== "-") ? '<span class="badge badge-attr">' + item.Attrs + '</span>' : "-";
                
                row.innerHTML = '<td>' + nameDisplay + '</td>' +
                                '<td>' + attrDisplay + '</td>' +
                                '<td>' + priceDisplay + '</td>' +
                                '<td>' + item.Qty + '</td>' +
                                '<td>' + item.Stall + '</td>' +
                                '<td style="color: var(--text-muted); font-size: 0.9em;">' + item.Position + '</td>' +
                                '<td><span class="badge">' + item.Category + '</span></td>';
                
                tbody.appendChild(row);
            });
        }

        function buildDynamicCategories(attrArray) {
            const categories = [
                { group: "⚔️ 攻擊與輸出類 (當前市場存在)", options: [] },
                { group: "🛡️ 防禦與存活類 (當前市場存在)", options: [] },
                { group: "🌟 基礎與其他類 (當前市場存在)", options: [] }
            ];

            attrArray.forEach(attr => {
                const lower = attr.toLowerCase();
                if (lower.includes("攻") || lower.includes("暴") || lower.includes("爆") || lower.includes("傷") || lower.includes("命中") || lower.includes("穿") || lower.includes("速")) {
                    categories[0].options.push(attr);
                } else if (lower.includes("防") || lower.includes("禦") || lower.includes("血") || lower.includes("精") || lower.includes("生命") || lower.includes("魔力") || lower.includes("閃") || lower.includes("避") || lower.includes("抗")) {
                    categories[1].options.push(attr);
                } else {
                    categories[2].options.push(attr);
                }
            });

            return categories.filter(c => c.options.length > 0);
        }

        const ACTIVE_ATTRIBUTE_CATEGORIES = buildDynamicCategories(discoveredAttributes);

        let searchHistory = JSON.parse(localStorage.getItem('search_history') || '[]');
        let pinnedSearches = JSON.parse(localStorage.getItem('pinned_searches') || '[]');

        (function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme);
        }

        let starredList = JSON.parse(localStorage.getItem('watchlist') || '[]');

        function toggleStar(itemName, event) {
            event.stopPropagation();
            const idx = starredList.indexOf(itemName);
            if (idx === -1) {
                starredList.push(itemName);
            } else {
                starredList.splice(idx, 1);
            }
            localStorage.setItem('watchlist', JSON.stringify(starredList));
            filterData();
            renderCategoryTabs();
        }

        function saveSearch(query) {
            query = query.trim();
            if (!query) return;
            searchHistory = searchHistory.filter(item => item !== query);
            searchHistory.unshift(query);
            if (searchHistory.length > 10) searchHistory.pop();
            localStorage.setItem('search_history', JSON.stringify(searchHistory));
            renderSuggestPanel();
        }

        function togglePin(query, event) {
            event.stopPropagation();
            const idx = pinnedSearches.indexOf(query);
            if (idx === -1) {
                pinnedSearches.push(query);
            } else {
                pinnedSearches.splice(idx, 1);
            }
            localStorage.setItem('pinned_searches', JSON.stringify(pinnedSearches));
            renderSuggestPanel();
        }

        function deleteHistory(query, event) {
            event.stopPropagation();
            searchHistory = searchHistory.filter(item => item !== query);
            localStorage.setItem('search_history', JSON.stringify(searchHistory));
            renderSuggestPanel();
        }

        function selectSuggest(query) {
            const input = document.getElementById('searchName');
            input.value = query;
            hideSuggestPanel();
            saveSearch(query);
            filterData();
        }

        function renderSuggestPanel() {
            const panel = document.getElementById('searchSuggestPanel');
            panel.innerHTML = '';

            if (pinnedSearches.length > 0) {
                const header = document.createElement('div');
                header.className = 'suggest-header';
                header.textContent = '📌 常用釘選';
                panel.appendChild(header);

                pinnedSearches.forEach(query => {
                    const item = document.createElement('div');
                    item.className = 'suggest-item';
                    item.onclick = () => selectSuggest(query);

                    const textSpan = document.createElement('span');
                    textSpan.className = 'suggest-text';
                    textSpan.textContent = query;

                    const pinBtn = document.createElement('button');
                    pinBtn.className = 'pin-btn pinned';
                    pinBtn.innerHTML = '★';
                    pinBtn.title = '取消釘選';
                    pinBtn.onclick = (e) => togglePin(query, e);

                    item.appendChild(textSpan);
                    item.appendChild(pinBtn);
                    panel.appendChild(item);
                });
            }

            const remainingHistory = searchHistory.filter(q => !pinnedSearches.includes(q));
            if (remainingHistory.length > 0) {
                const header = document.createElement('div');
                header.className = 'suggest-header';
                header.textContent = '🕒 最近搜尋';
                panel.appendChild(header);

                remainingHistory.forEach(query => {
                    const item = document.createElement('div');
                    item.className = 'suggest-item';
                    item.onclick = () => selectSuggest(query);

                    const textSpan = document.createElement('span');
                    textSpan.className = 'suggest-text';
                    textSpan.textContent = query;

                    const actionWrapper = document.createElement('div');
                    actionWrapper.style.display = 'flex';
                    actionWrapper.style.gap = '4px';

                    const pinBtn = document.createElement('button');
                    pinBtn.className = 'pin-btn';
                    pinBtn.innerHTML = '☆';
                    pinBtn.title = '釘選此關鍵字';
                    pinBtn.onclick = (e) => togglePin(query, e);

                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn';
                    delBtn.innerHTML = '×';
                    delBtn.title = '刪除紀錄';
                    delBtn.onclick = (e) => deleteHistory(query, e);

                    actionWrapper.appendChild(pinBtn);
                    actionWrapper.appendChild(delBtn);
                    item.appendChild(textSpan);
                    item.appendChild(actionWrapper);
                    panel.appendChild(item);
                });
            }

            if (pinnedSearches.length === 0 && remainingHistory.length === 0) {
                panel.innerHTML = '<div style="padding:12px; font-size:0.8rem; color:var(--text-muted); text-align:center;">無歷史搜尋紀錄</div>';
            }
        }

        function showSuggestPanel() {
            renderSuggestPanel();
            document.getElementById('searchSuggestPanel').classList.add('active');
        }

        function hideSuggestPanel() {
            setTimeout(() => {
                document.getElementById('searchSuggestPanel').classList.remove('active');
            }, 200);
        }

        let searchTimeout;
        function onSearchInput() {
            const query = document.getElementById('searchName').value;
            filterData();
            
            clearTimeout(searchTimeout);
            if (query.trim()) {
                searchTimeout = setTimeout(() => {
                    saveSearch(query);
                }, 1000);
            }
        }

        document.addEventListener('click', function(e) {
            const nameInput = document.getElementById('searchName');
            const suggestPanel = document.getElementById('searchSuggestPanel');
            if (e.target !== nameInput && !suggestPanel.contains(e.target)) {
                suggestPanel.classList.remove('active');
            }

            const attrInput = document.getElementById('searchAttr');
            const comboList = document.getElementById('comboboxList');
            if (e.target !== attrInput && !comboList.contains(e.target)) {
                comboList.classList.remove('active');
            }
        });

        function renderCombobox() {
            const list = document.getElementById('comboboxList');
            list.innerHTML = '';

            if (ACTIVE_ATTRIBUTE_CATEGORIES.length === 0) {
                list.innerHTML = '<div style="padding:12px; font-size:0.8rem; color:var(--text-muted); text-align:center;">當前市場商品無任何附加屬性</div>';
                return;
            }

            ACTIVE_ATTRIBUTE_CATEGORIES.forEach(cat => {
                const header = document.createElement('div');
                header.className = 'combobox-group-header';
                header.textContent = cat.group;
                list.appendChild(header);

                cat.options.forEach(opt => {
                    const item = document.createElement('div');
                    item.className = 'combobox-option';
                    item.textContent = opt;
                    item.onclick = () => selectComboboxOption(opt);
                    list.appendChild(item);
                });
            });
        }

        function showComboboxList() {
            document.getElementById('comboboxList').classList.add('active');
        }

        function filterComboboxOptions() {
            const query = document.getElementById('searchAttr').value.toLowerCase().trim();
            const list = document.getElementById('comboboxList');
            const clearBtn = document.getElementById('comboboxClearBtn');

            if (query) {
                clearBtn.style.display = 'block';
            } else {
                clearBtn.style.display = 'none';
            }

            list.innerHTML = '';
            let totalMatch = 0;

            ACTIVE_ATTRIBUTE_CATEGORIES.forEach(cat => {
                const matchedOptions = cat.options.filter(opt => opt.toLowerCase().includes(query));
                if (matchedOptions.length > 0) {
                    const header = document.createElement('div');
                    header.className = 'combobox-group-header';
                    header.textContent = cat.group;
                    list.appendChild(header);

                    matchedOptions.forEach(opt => {
                        const item = document.createElement('div');
                        item.className = 'combobox-option';
                        item.textContent = opt;
                        item.onclick = () => selectComboboxOption(opt);
                        list.appendChild(item);
                        totalMatch++;
                    });
                }
            });

            if (totalMatch === 0) {
                list.innerHTML = '<div style="padding:12px; font-size:0.8rem; color:var(--text-muted); text-align:center;">找不到匹配的真實詞條</div>';
            }

            filterData();
        }

        function selectComboboxOption(opt) {
            const input = document.getElementById('searchAttr');
            input.value = opt;
            document.getElementById('comboboxClearBtn').style.display = 'block';
            document.getElementById('comboboxList').classList.remove('active');
            filterData();
        }

        function clearCombobox(event) {
            event.stopPropagation();
            const input = document.getElementById('searchAttr');
            input.value = '';
            document.getElementById('comboboxClearBtn').style.display = 'none';
            document.getElementById('comboboxList').classList.remove('active');
            filterData();
        }

        let currentSortCol = 'originalIndex'; 
        let currentSortDir = 'asc'; 

        function changeSort(colName) {
            if (currentSortCol === colName) {
                if (currentSortDir === 'asc') {
                    currentSortDir = 'desc';
                } else if (currentSortDir === 'desc') {
                    currentSortCol = 'originalIndex';
                    currentSortDir = 'asc';
                }
            } else {
                currentSortCol = colName;
                currentSortDir = 'asc';
            }
            updateSortHeaders();
            filterData();
        }

        function updateSortHeaders() {
            const cols = {
                'Name': 'th-name',
                'Attrs': 'th-attrs',
                'PriceRaw': 'th-price',
                'QtyRaw': 'th-qty',
                'Stall': 'th-stall',
                'Position': 'th-pos',
                'Category': 'th-cat'
            };
            
            for (const key in cols) {
                const el = document.getElementById(cols[key]);
                if (!el) continue;
                el.classList.remove('sort-active');
                const indicator = el.querySelector('.sort-indicator');
                if (indicator) indicator.textContent = '';
            }

            if (currentSortCol !== 'originalIndex') {
                const activeElId = cols[currentSortCol];
                if (activeElId) {
                    const el = document.getElementById(activeElId);
                    if (el) {
                        el.classList.add('sort-active');
                        const indicator = el.querySelector('.sort-indicator');
                        if (indicator) {
                            indicator.textContent = currentSortDir === 'asc' ? ' ▲' : ' ▼';
                        }
                    }
                }
            }
        }

        let activeCategory = '全部';

        function renderCategoryTabs() {
            const counts = { '全部': rawData.length };
            rawData.forEach(function(item) {
                const cat = item.Category;
                if (cat) {
                    counts[cat] = (counts[cat] || 0) + 1;
                }
            });

            const container = document.getElementById('categoryTabsContainer');
            container.innerHTML = '';

            const preferredOrder = ['全部', '道具', '裝備', '寵物', '烹飪調配'];
            const allCats = Object.keys(counts);
            const finalOrder = [];

            preferredOrder.forEach(function(cat) {
                if (allCats.indexOf(cat) !== -1) {
                    finalOrder.push(cat);
                }
            });
            allCats.forEach(function(cat) {
                if (finalOrder.indexOf(cat) === -1) {
                    finalOrder.push(cat);
                }
            });

            finalOrder.forEach(function(cat) {
                const count = counts[cat];
                const tab = document.createElement('div');
                tab.className = 'category-tab' + (activeCategory === cat ? ' active' : '');
                tab.onclick = function() {
                    selectCategory(cat);
                };
                tab.innerHTML = cat + '<span class="category-count">' + count + '</span>';
                container.appendChild(tab);
            });
        }

        function selectCategory(cat) {
            activeCategory = cat;
            renderCategoryTabs();
            filterData();
        }

        function checkLiveUpdate() {
            const oldScript = document.getElementById('liveStampScript');
            if (oldScript) oldScript.remove();
            
            const script = document.createElement('script');
            script.id = 'liveStampScript';
            script.src = 'live-stamp.js?t=' + new Date().getTime();
            script.onload = function() {
                if (window.__last_market_update && window.__last_market_update !== pageLoadTime) {
                    window.location.reload();
                }
            };
            document.head.appendChild(script);
        }
        setInterval(checkLiveUpdate, 5000);

        const itemStats = {};
        for (const name in statsMap) {
            const prices = statsMap[name];
            const sortedPrices = [].concat(prices).sort((a,b) => a-b);
            const len = sortedPrices.length;
            const mid = Math.floor(len / 2);
            const median = len % 2 !== 0 ? sortedPrices[mid] : Math.round((sortedPrices[mid - 1] + sortedPrices[mid]) / 2);
            
            itemStats[name] = { 
                min: sortedPrices[0], 
                max: sortedPrices[len - 1], 
                median: median, 
                count: len 
            };
        }

        rawData.forEach(item => {
            item.IsSnipe = false;
            item.SnipeDiscount = 0;
            const stat = itemStats[item.Name];
            if (stat && stat.count >= 2 && item.PriceRaw > 0) {
                const limitPrice = stat.median * 0.15;
                if (item.PriceRaw < limitPrice) {
                    item.IsSnipe = true;
                    item.SnipeDiscount = Math.round((1 - (item.PriceRaw / stat.median)) * 100);
                }
            }
        });

        function formatCompact(num) {
            if (num >= 10000) {
                return (num / 10000).toFixed(1).replace(/\.0$/, '') + '萬';
            }
            return num.toLocaleString();
        }

        function parseAttributeValue(attrText, attrName) {
            if (!attrText || attrText === "-") return null;
            const cleanText = attrText.replace(/[:：\+\-]/g, ' '); 
            const tokens = cleanText.split(/\s+/);
            
            for (let i = 0; i < tokens.length; i++) {
                if (tokens[i].includes(attrName)) {
                    const nextToken = tokens[i + 1];
                    if (nextToken && /^\d+$/.test(nextToken)) {
                        return parseInt(nextToken, 10);
                    }
                }
            }
            return null;
        }

        function calculateRelativeTime(fetchedAtStr) {
            const t = fetchedAtStr.split(/[- :]/);
            const diffMins = Math.floor((new Date() - new Date(t[0], t[1] - 1, t[2], t[3], t[4], t[5])) / 60000);
            if (diffMins < 1) return "剛剛";
            if (diffMins < 60) return diffMins + " 分鐘前";
            return Math.floor(diffMins / 60) + " 小時 " + (diffMins % 60) + " 分鐘前";
        }

        function openHistoryModal() {
            const container = document.getElementById('historyListContainer');
            container.innerHTML = '';
            const reversedHistory = [].concat(updateHistory).reverse();
            if (reversedHistory.length === 0) {
                container.innerHTML = '<div class="history-empty">目前尚未累積任何歷史紀錄。</div>';
            } else {
                reversedHistory.forEach(function(h) {
                    container.appendChild(NewHistoryItem(h));
                });
            }
            document.getElementById('historyModal').style.display = 'flex';
        }

        function NewHistoryItem(h) {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = '<span class="history-time">官網更新：' + h.SiteUpdated + '</span>' +
                             '<span class="history-relative">' + calculateRelativeTime(h.FetchedAt) + '</span>';
            return item;
        }

        function closeHistoryModal() { document.getElementById('historyModal').style.display = 'none'; }
        function closeHistoryModalOnOutsideClick(event) { if (event.target.id === 'historyModal') closeHistoryModal(); }

        renderCombobox();
        renderCategoryTabs();
        updateSortHeaders();
        filterData();
    </script>
</body>
</html>
